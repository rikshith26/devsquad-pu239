<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password // Foundify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_sliding.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Specific override for single card view */
        body {
            background: linear-gradient(135deg, #fdfbf7 0%, #fff0f0 100%);
        }

        .auth-container {
            width: 450px;
            /* Smaller width for single card */
            min-height: auto;
            display: flex;
            flex-direction: column;
            padding: 40px;
            align-items: center;
        }

        .form-container {
            position: relative;
            width: 100%;
            padding: 0;
            top: auto;
            left: auto;
            right: auto;
            transform: none;
            height: auto;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div style="width:100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-size: 0.9rem;
                        background: {{ '#d4edda' if category == 'success' else '#f8d7da' }}; 
                        color: {{ '#155724' if category == 'success' else '#721c24' }};">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="form-container">
            <form action="/forgot-password" method="POST">
                <h1 class="form-title">Reset Password</h1>
                <span>Enter your email to receive a reset link</span>

                <input type="email" name="email" placeholder="Email Address" required />

                <button type="submit" class="primary" style="margin-top: 20px;">Send Link</button>

                <a href="/login" style="margin-top: 20px; font-size: 0.85rem;">Back to Sign In</a>
            </form>
        </div>
    </div>

</body>

</html>
