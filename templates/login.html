<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In // Foundify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_sliding.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="page-login">

    <div class="auth-container" id="container">

        <!-- LEFT: SIGN IN FORM -->
        <div class="form-container">
            <form method="POST" action="/login">
                <h1 class="form-title">Sign in</h1>
                <div class="social-container">
                    <a href="/google-login" class="social"><i class="fab fa-google"></i></a>
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span style="font-size: 12px; margin-bottom: 15px; color: #aaa;">or use your account</span>

                <!-- FLASH MESSAGES -->
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div style="color: #ff6b6b; font-size: 0.9rem; margin-bottom: 1rem;">
                    {% for message in messages %}
                    {{ message }}
                    {% endfor %}
                </div>
                {% endif %}
                {% endwith %}

                <input type="email" name="email" placeholder="Email" required />
                <input type="password" name="password" placeholder="Password" required />
                <a href="/forgot-password">Forgot your password?</a>
                <button type="submit" class="primary">Sign In</button>

                <!-- Mobile Toggle -->
                <a href="/signup" class="mobile-toggle">Need an account? Sign Up</a>
            </form>
        </div>

        <!-- RIGHT: OVERLAY PANEL -->
        <div class="overlay-container">
            <h1 class="overlay-title">Hello, Friend!</h1>
            <p>Enter your personal details and start your journey with us</p>
            <button class="ghost" id="signUp">Sign Up</button>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/auth_sliding.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mobile_check.js') }}"></script>
</body>

</html>
