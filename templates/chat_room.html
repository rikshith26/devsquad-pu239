<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation // {{ chat.item_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/memories.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>

<body class="layout-compact"
    style="height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-paper);">

    <!-- FIXED HEADER -->
    <header
        style="padding: 0.8rem 1rem; background: white; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; z-index: 10;">
        <a href="/user/chats" class="btn-hope btn-soft"
            style="padding: 0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
            <span class="material-icons">arrow_back</span>
        </a>
        <div style="flex: 1; overflow: hidden;">
            <h3 style="margin: 0; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{
                chat.item_name }}</h3>
            <span style="font-size: 0.8rem; color: var(--text-pencil); display: block;">Private Conversation</span>
        </div>
    </header>

    <!-- SCROLLABLE MESSAGES -->
    <div id="messages"
        style="flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; background: #fffcf5;">
        {% for msg in chat.messages %}
        <div class="chat-bubble {{ 'me' if msg.is_me else 'them' }}">
            {{ msg.text }}
            <div style="font-size: 0.65rem; opacity: 0.7; margin-top: 0.3rem; text-align: right;">
                {{ msg.timestamp.strftime('%H:%M') }}
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- FLOATING INPUT -->
    <div
        style="position: fixed; bottom: 0; left: 0; width: 100%; pointer-events: none; padding: 1rem 1rem calc(1.5rem + env(safe-area-inset-bottom)) 1rem; background: linear-gradient(to top, rgba(253, 251, 247, 1) 20%, rgba(253, 251, 247, 0)); z-index: 20;">
        <div
            style="pointer-events: auto; background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 0.5rem 0.5rem 0.5rem 1.5rem; display: flex; align-items: center; gap: 0.5rem; border: 1px solid rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto;">
            <input type="text" id="messageInput" class="input-field" placeholder="Type a message..." autocomplete="off"
                style="border: none; background: transparent; padding: 0.5rem 0; flex: 1; box-shadow: none; font-size: 1rem;">

            <button onclick="sendMessage()" class="btn-hope"
                style="padding: 0; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; min-height: 45px; background: var(--accent-sky); color: white; box-shadow: 0 4px 12px rgba(84, 160, 255, 0.3);">
                <span class="material-icons" style="font-size: 1.3rem; margin-left: 3px;">send</span>
            </button>
        </div>
    </div>

    <!-- SPACER for fixed input -->
    <div style="height: 100px; flex-shrink: 0;"></div>

    <script>
        const socket = io();
        const roomId = "{{ chat._id }}";
        const currentUserId = "{{ current_user_id }}"; // Server must inject this
        const messagesContainer = document.getElementById('messages');
        const input = document.getElementById('messageInput');

        socket.emit('join', { room: roomId });

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        // Scroll on load
        window.onload = scrollToBottom;

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                // Optimistic UI Update
                // appendMessage(text, 'me'); 

                socket.emit('send_message', { room: roomId, message: text, sender_id: currentUserId });
                input.value = '';
                input.focus();
            }
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        socket.on('receive_message', (data) => {
            // If we used optimistic update, we might need to handle dupes or id checks, 
            // but for now let's just use the server event
            appendMessage(data.text, data.sender_id === currentUserId ? 'me' : 'them', data.timestamp);
        });

        function appendMessage(text, type, timeStr) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${type}`;
            // Simple time if not provided
            const time = timeStr || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                ${text}
                <div style="font-size: 0.65rem; opacity: 0.7; margin-top: 0.3rem; text-align: right;">
                    ${time}
                </div>
            `;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        window.onbeforeunload = () => {
            socket.emit('leave', { room: roomId });
        };

        // Mobile viewport height fix
        const setVh = () => {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();
    </script>

    <style>
        /* Scoped overrides for this page */
        body {
            /* Fallback for browsers that don't support custom properties */
            height: 100vh;
            /* Use custom property for actual viewport height on mobile */
            height: calc(var(--vh, 1vh) * 100);
        }

        .chat-bubble {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .chat-bubble.me {
            background: var(--accent-sky);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-bubble.them {
            background: white;
            border: 1px solid #eee;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
    </style>
</body>

</html>
