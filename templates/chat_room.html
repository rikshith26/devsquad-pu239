<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - {{ chat.item_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 4rem);
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .chat-messages {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #F8FAFC;
        }

        .message-bubble {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .message-bubble.me {
            align-self: flex-end;
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-bubble.them {
            align-self: flex-start;
            background: white;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            border-bottom-left-radius: 4px;
        }

        .message-bubble.system {
            align-self: center;
            background: #FEF3C7;
            color: #92400E;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            text-align: center;
            max-width: 90%;
        }

        .chat-input-area {
            padding: 1.5rem;
            background: white;
            border-top: 1px solid #E2E8F0;
        }

        .chat-form {
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 2px solid #E2E8F0;
            border-radius: 99px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #8B5CF6;
        }
    </style>
</head>

<body style="background: #F1F5F9; padding: 2rem; font-family: 'Outfit', sans-serif;">
    <div class="chat-container">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="/user/chats" class="btn-icon">
                    <span class="material-icons">arrow_back</span>
                </a>
                <div>
                    <h2 style="font-size: 1.25rem; margin: 0;">{{ chat.item_name }}</h2>
                    <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">Secure Chat</p>
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <span class="material-icons" style="color: #10B981; font-size: 20px;">lock</span>
                <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">End-to-End
                    Encrypted</span>
            </div>
        </div>

        <div class="chat-messages" id="messages">
            {% for msg in chat.messages %}
            {% if msg.is_system %}
            <div class="message-bubble system">
                {{ msg.text }}
            </div>
            {% elif msg.is_me %}
            <div class="message-bubble me">
                {{ msg.text }}
            </div>
            {% else %}
            <div class="message-bubble them">
                {{ msg.text }}
            </div>
            {% endif %}
            {% endfor %}
        </div>

        <div class="chat-input-area">
            <form class="chat-form" method="POST">
                <input type="text" name="message" class="chat-input" placeholder="Type a message..." required
                    autocomplete="off" autofocus>
                <button type="submit" class="btn btn-primary"
                    style="border-radius: 50%; width: 54px; height: 54px; padding: 0; display: flex; align-items: center; justify-content: center;">
                    <span class="material-icons">send</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Auto-scroll to bottom
        const messagesContainer = document.getElementById('messages');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    </script>
</body>

</html>
