<!-- LOADER OVERLAY -->
<script src="{{ url_for('static', filename='js/mobile_check.js') }}"></script>
<div id="foundify-loader">
    <div class="loader-content">
        <div class="logo-text">
            <span>F</span>
            <span>o</span>
            <span>u</span>
            <span>n</span>
            <span>d</span>
            <span>i</span>
            <span>f</span>
            <span>y</span>
        </div>
        <div class="loading-bar">
            <div class="progress"></div>
        </div>
    </div>
</div>

<style>
    /* Loader Overlay */
    #foundify-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fffbf7;
        /* Matches --bg-paper */
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
    }

    /* Hide Loader Class */
    #foundify-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    /* Content Wrapper */
    .loader-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
    }

    /* Logo Text Animation */
    .logo-text {
        font-family: 'Outfit', sans-serif;
        /* Setup font if not available */
        font-size: 3rem;
        font-weight: 700;
        color: #2d3436;
        /* --text-ink */
        display: flex;
        gap: 0.1rem;
        overflow: hidden;
    }

    .logo-text span {
        display: inline-block;
        opacity: 0;
        transform: translateY(20px);
        animation: revealLetter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Staggered Delay */
    .logo-text span:nth-child(1) {
        animation-delay: 0.1s;
        color: #ff9f43;
        /* --accent-peach */
    }

    .logo-text span:nth-child(2) {
        animation-delay: 0.15s;
    }

    .logo-text span:nth-child(3) {
        animation-delay: 0.2s;
    }

    .logo-text span:nth-child(4) {
        animation-delay: 0.25s;
    }

    .logo-text span:nth-child(5) {
        animation-delay: 0.3s;
    }

    .logo-text span:nth-child(6) {
        animation-delay: 0.35s;
        color: #54a0ff;
        /* --accent-sky */
    }

    .logo-text span:nth-child(7) {
        animation-delay: 0.4s;
    }

    .logo-text span:nth-child(8) {
        animation-delay: 0.45s;
    }

    @keyframes revealLetter {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }

        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Loading Bar */
    .loading-bar {
        width: 120px;
        height: 4px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
    }

    .loading-bar .progress {
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, #ff9f43, #ff6b6b, #54a0ff);
        position: absolute;
        left: -50%;
        border-radius: 2px;
        animation: loadProgress 1.5s infinite ease-in-out;
    }

    @keyframes loadProgress {
        0% {
            left: -50%;
            width: 50%;
        }

        50% {
            left: 25%;
            width: 50%;
        }

        100% {
            left: 100%;
            width: 50%;
        }
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
        .logo-text {
            font-size: 2.5rem;
        }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const loader = document.getElementById('foundify-loader');

        // Ensure minimum display time for the brand moment (e.g. 1.2s)
        const minDisplayTime = 1200;
        const startTime = Date.now();

        window.onload = function () {
            const elapsedTime = Date.now() - startTime;
            const remainingTime = Math.max(0, minDisplayTime - elapsedTime);

            setTimeout(() => {
                loader.classList.add('hidden');
                if (typeof window.checkDevice === 'function') window.checkDevice();
            }, remainingTime);
        };
    });
</script>
