<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Foundify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="flex-center" style="min-height: 100vh;">
    <div class="card fade-in" style="width: 100%; max-width: 500px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-main);">Create New Admin</h1>
            <p style="color: var(--text-muted);">Register a new administrator account.</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div
            style="background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem;">
            {% for message in messages %}
            <p style="margin: 0;">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label
                    style="display: block; color: var(--text-main); margin-bottom: 0.75rem; font-weight: 500;">Name</label>
                <input type="text" name="name" class="form-input" placeholder="Admin Name" required>
            </div>
            <div class="form-group">
                <label
                    style="display: block; color: var(--text-main); margin-bottom: 0.75rem; font-weight: 500;">Email</label>
                <input type="email" name="email" class="form-input" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label
                    style="display: block; color: var(--text-main); margin-bottom: 0.75rem; font-weight: 500;">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Secure Password" required
                    minlength="8" pattern="(?=.*[!@#$%^&*(),.?\:{}|<>]).{8,}"
                    title="Must be at least 8 characters and include a special character.">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Create Account
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="/superadmin/dashboard" style="color: var(--text-muted); font-size: 0.9rem;">
                <span class="material-icons" style="font-size: 14px; vertical-align: middle;">arrow_back</span>
                Back to Dashboard
            </a>
        </div>
    </div>
    </div>
    <script src="{{ url_for('static', filename='offline.js') }}"></script>
</body>

</html>
