<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Super Admin Profile - Lost & Found AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            overflow-x: hidden;
            background: var(--bg-main);
        }

        .profile-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            min-height: 100vh;
        }

        .profile-sidebar {
            background: white;
            padding: 4rem 2rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px dashed #E2E8F0;
            z-index: 10;
        }

        .profile-content {
            padding: 5rem 6rem;
            max-width: 900px;
            position: relative;
        }

        .deco-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float-gentle 8s infinite alternate;
        }

        .input-pill {
            background: transparent;
            border: none;
            border-bottom: 2px solid #E2E8F0;
            padding: 1rem 0;
            font-size: 1.1rem;
            font-weight: 500;
            width: 100%;
            border-radius: 0;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            margin-bottom: 2rem;
        }

        .input-pill:focus {
            outline: none;
            border-color: #F6AD55;
            padding-left: 10px;
        }

        label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
            }

            .profile-sidebar {
                height: auto;
                position: relative;
                padding: 3rem 1.5rem;
                text-align: center;
                border-right: none;
                border-bottom: 1px dashed #E2E8F0;
            }

            .profile-content {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <!-- LEFT: Sidebar -->
        <aside class="profile-sidebar fade-in">
            <a href="/superadmin/dashboard"
                style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 3rem; align-self: flex-start;">
                <span class="material-icons">arrow_back</span>
                Back to Dashboard
            </a>

            <div style="margin-top: auto; margin-bottom: auto;">
                <div id="profile-photo-wrapper"
                    style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
                    {% if user.profile_photo %}
                    <img src="/{{ user.profile_photo }}"
                        style="width:140px; height:140px; border-radius: 40px; object-fit: cover; box-shadow: 20px 20px 60px #d1d5db, -20px -20px 60px #ffffff;">
                    {% else %}
                    <div
                        style="width:140px; height:140px; border-radius: 40px; background: linear-gradient(135deg, #10B981 0%, #3B82F6 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; font-weight: 700; box-shadow: 0 20px 50px rgba(16, 185, 129, 0.3);">
                        {{ user.name[0] }}
                    </div>
                    {% endif %}
                    <div onclick="triggerPhotoUpload()"
                        style="position: absolute; bottom: -10px; right: -10px; background: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-soft); cursor: pointer; transition: transform 0.2s;">
                        <span class="material-icons" style="color: #10B981; font-size: 20px;">edit</span>
                    </div>
                </div>

                <h1 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-main);">{{ user.name }}</h1>
                <span
                    style="background: #ECFDF5; padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.85rem; color: #10B981; font-weight: 500;">Super
                    Admin</span>
            </div>

            <div style="margin-top: auto; font-size: 0.85rem; color: #CBD5E1;">
                ID: #{{ user.user_id }}
            </div>
        </aside>

        <!-- RIGHT: Form -->
        <main class="profile-content">
            <div class="deco-circle"
                style="width: 400px; height: 400px; background: #A7F3D0; top: -100px; right: -100px;"></div>

            <div style="position: relative; z-index: 5;">
                <header style="margin-bottom: 3rem;">
                    <h2 class="text-gradient" style="font-size: 2.5rem; display: inline-block; margin-bottom: 0.5rem;">
                        Super Admin Profile</h2>
                    <p style="color: var(--text-muted);">Master system control.</p>
                </header>

                <form method="POST" enctype="multipart/form-data">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;">
                        <div>
                            <label>Designation</label>
                            <input type="text" name="study" value="{{ user.study or '' }}" class="input-pill"
                                placeholder="e.g. System Owner" required>
                        </div>
                        <div>
                            <label>Secure Phone</label>
                            <input type="text" name="phone" value="{{ user.phone or '' }}" class="input-pill"
                                placeholder="+91 00000 00000" required>
                        </div>
                    </div>

                    <!-- Hidden Photo Input -->
                    <input type="file" id="hidden-photo-input" name="photo" accept="image/*" style="display: none;"
                        onchange="previewImage(this)">

                    <!-- Hidden field reuse -->
                    <input type="hidden" name="college" value="{{ user.college or 'Central Command' }}">

                    <div style="margin-top: 3rem; display: flex; justify-content: flex-end;">
                        <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; border-radius: 50px;">
                            Save Details
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Image Preview Script -->
    <script>
        function triggerPhotoUpload() {
            document.getElementById('hidden-photo-input').click();
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();

                reader.onload = function (e) {
                    var wrapper = document.getElementById('profile-photo-wrapper');

                    // Remove existing content except edit button (simulated by finding img or div)
                    var existingImg = wrapper.querySelector('img');
                    var existingPlaceholder = wrapper.querySelector('div:not([onclick])'); // Exclude the edit button which should have onclick now

                    if (existingImg) {
                        existingImg.src = e.target.result;
                    } else if (existingPlaceholder) {
                        // Replace placeholder with new img
                        var newImg = document.createElement('img');
                        newImg.src = e.target.result;
                        newImg.style.cssText = "width:140px; height:140px; border-radius: 40px; object-fit: cover; box-shadow: 20px 20px 60px #d1d5db, -20px -20px 60px #ffffff;";

                        wrapper.replaceChild(newImg, existingPlaceholder);
                    }
                }

                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>

</html>
